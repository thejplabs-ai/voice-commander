# aios.config.yaml — AIOS configuration for voice-commander
# Generated by: aios install
# Date: 2026-02-26

aios:
  version: "1.0"

  # Agents habilitados neste projeto
  agents:
    include:
      - webdev
      - dev
      - db-sage
      - devops
      - qa
      - security
      - architect
      - uiux
      - web-designer
      - analyst
      - pm
      - legal-chief
      - aios-master
      - pedro-valerio
      - tools-orchestrator

  # Skills/Pipelines habilitados
  pipelines:
    include:
      - email
      - component
      - design-system
      - extract-ds

  # MCPs habilitados (gera .claude/settings.json)
  mcps:
    include:
      - google-docs
      - playwright
      - context7
      - gmail
      - n8n

  # Brand rules
  rules:
    include: []
    brand_enforcement: true

  # Documentos do projeto
  project:
    claude_md: "./CLAUDE.md"
    # prd: "./PRD.md"  # Descomentar quando PRD estiver pronto

  # Brand context (true apenas para projetos JP Labs)
  brand:
    inherit_from_core: true

  # Knowledge base
  knowledge:
    gotchas: true
    patterns: true
    gotcha_filter:
      - "Code & Implementation"
      - "Sistema de Agentes"
    gotcha_exclude:
      # Projeto JP Labs — todos os gotchas relevantes

  # Agent memory
  memory:
    isolation: false   # true = memória isolada em .aios-local/agent-memory/
